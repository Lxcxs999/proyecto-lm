<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardineria Verdana</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/main.js" defer></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD278qpX0Lie4f6P32BRj-JqdZTJDSY_OU&libraries=maps,marker" defer></script>
</head>
<body class="home">
    <nav>
        <div class="logo-container">
            <a href="index.html">
                <img src="images/logo_jardineria.png" alt="Jardinería Verdana" class="logo">
            </a>
        </div>

        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="enfermeria.html">Enfermería</a>
            <a href="contacto.html">Contacto</a>
        </div>

        <div class="nav-cart">
            <a href="login.html"><img src="images/user.png" alt="Usuario" class="user"></a>
            <img src="images/shopping-bag.png" alt="Carrito" class="cart">
        </div>
    </nav>
    <main>
        <div class="contacto-wrapper">
                <gmp-map
                center="37.4220656,-122.0840897"
                zoom="10"
                map-id="DEMO_MAP_ID"
                style="height: 500px"></gmp-map>
            <div class="formulario-contacto">
                <h1>Contáctanos</h1>
                <form action="#" method="post">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name" required><br>

                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required><br>

                    <label for="message">Mensaje:</label>
                    <textarea id="message" name="message" rows="5" required></textarea><br>

                    <button type="submit">Enviar</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <div class="copy">
            <p>&copy; 2026 Jardinería Verdana. Todos los derechos reservados.</p>
        </div>
        <div class="dictionary">
            <a href="xml/glosario.xml" target="_blank" class="enlace-glosario">Consultar Glosario Botánico</a>
        </div>
    </footer>
</body>
</html>
